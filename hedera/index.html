<!DOCTYPE html>
<html lang="cs" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>27bratislavská</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <header class="container">
    <nav>
      <ul>
        <li><a href="#/" onclick="window.location.hash='/'"><strong>27bratislavská</strong></a></li>
      </ul>
      <ul>
        <li><a href="#/platby" data-nav>Platby</a></li>
        <li><a href="#/dluhy" data-nav>Dlužníci</a></li>
        <li><a href="#/income" data-nav>Příjmy</a></li>
        <li><a href="#/smlouvy" data-nav>Smlouvy</a></li>
        <li><a href="#/parking" data-nav>Parking</a></li>
        <li><a href="#/naklady" data-nav>Náklady</a></li>
        <li><a href="#/todo" data-nav>TODO</a></li>
        <li><a href="#/audit" data-nav>Audit</a></li>
        <li style="margin-left:auto"><a href="#" id="theme-toggle" title="Přepnout režim" aria-label="Přepnout denní/noční režim">🌙</a></li>
      </ul>
    </nav>
  </header>

  <main class="container" id="app">
    <!-- Login screen -->
    <article id="login-screen">
      <h2>Přihlášení</h2>
      <form id="login-form">
        <label for="password">Heslo</label>
        <input type="password" id="password" name="password" placeholder="Zadejte heslo" autofocus required>
        <button type="submit">Odemknout</button>
      </form>
      <p id="login-error" class="error" hidden>Nesprávné heslo nebo poškozená databáze.</p>
    </article>

    <!-- Content area (hidden until authenticated) -->
    <div id="content" hidden></div>
  </main>

  <footer class="container">
    <small id="db-info"></small>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.11.0/sql-wasm.js" integrity="sha384-1fHJox8K973mCCD3PTAOc0ljrAGXD2VeK8zf+vNIdx55pWPULNlpxKMkU8bF4nUd" crossorigin="anonymous"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
