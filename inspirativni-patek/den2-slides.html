<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Den 2: Jak to děláme — Inspirativní pátek</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #f5f5f5;
            --surface: #ffffff;
            --primary: #d63031;
            --text: #2d3436;
            --text-muted: #636e72;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        header a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
        }

        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        #content {
            background: var(--surface);
            padding: 2rem;
            border-radius: 8px;
            line-height: 1.6;
        }

        #content h1, #content h2, #content h3 {
            color: var(--primary);
            margin-top: 2rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        #content h1:first-child {
            margin-top: 0;
        }

        #content pre {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
            font-size: 0.85rem;
            line-height: 1.4;
            color: #212529;
        }

        #content code {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
        }

        #content p code {
            background: #f1f3f4;
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            font-size: 0.9em;
        }

        #content hr {
            border: none;
            border-top: 2px solid var(--primary);
            margin: 3rem 0;
        }

        #content strong {
            color: #2d3436;
        }

        #content ul, #content ol {
            padding-left: 1.5rem;
        }

        #content li {
            margin: 0.5rem 0;
        }

        #content blockquote {
            border-left: 4px solid var(--primary);
            margin: 1rem 0;
            padding: 0.5rem 1rem;
            background: rgba(233, 69, 96, 0.1);
        }

        #content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        #content th, #content td {
            border: 1px solid rgba(0,0,0,0.1);
            padding: 0.5rem;
            text-align: left;
        }

        #content th {
            background: #f8f9fa;
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
        }

        @media (max-width: 600px) {
            header {
                padding: 1rem;
            }

            h1 {
                font-size: 1.2rem;
            }

            main {
                padding: 1rem;
            }

            #content {
                padding: 1rem;
            }

            #content pre {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Den 2: Jak to děláme</h1>
        <a href="./">← Zpět na přehled</a>
    </header>

    <main>
        <div id="content">
            <div class="loading">Loading...</div>
        </div>
    </main>

    <footer>
        <a href="../">lukasmazanek.github.io/public</a>
    </footer>

    <script>
        async function load() {
            try {
                const response = await fetch('den2-slides.md');
                if (!response.ok) throw new Error('File not found');
                const text = await response.text();
                document.getElementById('content').innerHTML = marked.parse(text);
            } catch (error) {
                document.getElementById('content').innerHTML = '<p>Error loading document: ' + error.message + '</p>';
            }
        }
        load();
    </script>
</body>
</html>
